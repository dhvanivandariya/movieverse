<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎬 MovieVerse</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">Movies</a>
        <a href="#">Trending</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Unlimited Movies, TV Shows & More</h2>
    <p>Watch the latest blockbuster movies in one place.</p>

    <button>Explore Now</button>
</section>
<section class="movies">

    <h2>Trending Movies</h2>

    <div class="movie-container">

        <div class="card">
            <img src="https://via.placeholder.com/200x300" alt="Movie">
            <h3>Avatar</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x300" alt="Movie">
            <h3>Avengers</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x300" alt="Movie">
            <h3>Interstellar</h3>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x300" alt="Movie">
            <h3>Joker</h3>
        </div>

    </div>

</section>
</body>
</html>
